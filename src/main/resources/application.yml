spring:
  datasource:
    url: jdbc:h2:mem:payment_db
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
server:
  port: 8081
logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
