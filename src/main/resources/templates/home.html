<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Gestion des Paiements</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-container {
            padding: 2rem;
        }
        .dashboard-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 2rem;
            margin-bottom: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }
        .welcome-header {
            background: linear-gradient(45deg, #4a90e2, #7b68ee);
            color: white;
            padding: 2.5rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .action-link {
            display: block;
            padding: 1.2rem 1.5rem;
            margin: 0.8rem 0;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 500;
            text-align: center;
        }
        .action-link:hover {
            transform: translateX(10px);
            background: linear-gradient(45deg, #764ba2, #667eea);
            color: white;
            text-decoration: none;
        }
        .action-link i {
            margin-right: 10px;
        }
        .section-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title i {
            color: #667eea;
        }
        .logout-btn {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .logout-btn:hover {
            background: linear-gradient(45deg, #c0392b, #e74c3c);
            transform: scale(1.05);
        }
        .user-info {
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="container main-container">
        <div class="welcome-header">
            <h1 class="display-4 mb-3">
                <i class="fas fa-credit-card me-3"></i>
                Gestion des Paiements
            </h1>
            <div class="user-info">
                <p class="mb-0">
                    <i class="fas fa-user-circle me-2"></i>
                    Bienvenue, <span sec:authentication="name">Utilisateur</span>
                </p>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-6">
                <div class="dashboard-card">
                    <h2 class="section-title">
                        <i class="fas fa-tachometer-alt"></i>
                        Gestion des données
                    </h2>
                    <a href="/payments" class="action-link">
                        <i class="fas fa-money-bill-wave"></i>
                        Voir tous les paiements
                    </a>
                    <a href="/clients" class="action-link">
                        <i class="fas fa-users"></i>
                        Voir tous les clients
                    </a>
                    <a href="/users" class="action-link">
                        <i class="fas fa-user-shield"></i>
                        Voir tous les utilisateurs
                    </a>
                </div>
            </div>
            
            <div class="col-lg-6">
                <div class="dashboard-card">
                    <h2 class="section-title">
                        <i class="fas fa-tools"></i>
                        Outils & Export
                    </h2>
                    <a href="/h2-console" target="_blank" class="action-link">
                        <i class="fas fa-database"></i>
                        Console de la base de données H2
                    </a>
                    <a href="/export/csv/payments" class="action-link">
                        <i class="fas fa-file-csv"></i>
                        Exporter les paiements (CSV)
                    </a>
                    <a href="/export/csv/clients" class="action-link">
                        <i class="fas fa-file-csv"></i>
                        Exporter les clients (CSV)
                    </a>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn logout-btn">
                    <i class="fas fa-sign-out-alt me-2"></i>
                    Se déconnecter
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
