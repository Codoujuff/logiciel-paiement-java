<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Liste des Clients</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-container {
            padding: 2rem;
        }
        .page-header {
            background: linear-gradient(45deg, #4a90e2, #7b68ee);
            color: white;
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .data-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .table-container {
            overflow-x: auto;
        }
        .custom-table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .custom-table thead {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }
        .custom-table th {
            border: none;
            padding: 1rem;
            font-weight: 600;
        }
        .custom-table td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .custom-table tbody tr:hover {
            background-color: #f8f9ff;
            transform: scale(1.01);
            transition: all 0.2s ease;
        }
        .action-btn {
            padding: 0.4rem 0.8rem;
            margin: 0.2rem;
            border-radius: 8px;
            border: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .btn-edit {
            background-color: #4a90e2;
            color: white;
        }
        .btn-delete {
            background-color: #e74c3c;
            color: white;
        }
        .btn-add {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        .back-btn {
            background: linear-gradient(45deg, #6c757d, #5a6268);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.3);
            color: white;
            text-decoration: none;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #6c757d;
        }
        .empty-state i {
            font-size: 4rem;
            color: #dee2e6;
            margin-bottom: 1rem;
        }
        .export-btn {
            background: linear-gradient(45deg, #17a2b8, #138496);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(23, 162, 184, 0.3);
            color: white;
            text-decoration: none;
        }
        .client-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container main-container">
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h1 class="mb-0">
                        <i class="fas fa-users me-3"></i>
                        Liste des Clients
                    </h1>
                </div>
                <div class="col-md-6 text-md-end mt-3 mt-md-0">
                    <a href="/" class="back-btn me-2">
                        <i class="fas fa-arrow-left me-2"></i>
                        Retour
                    </a>
                    <a href="/export/csv/clients" class="export-btn">
                        <i class="fas fa-file-csv me-2"></i>
                        Exporter CSV
                    </a>
                </div>
            </div>
        </div>

        <div class="data-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="mb-0">
                    <i class="fas fa-address-book me-2"></i>
                    Tous les clients
                </h3>
                <button class="btn-add" data-bs-toggle="modal" data-bs-target="#addClientModal">
                    <i class="fas fa-plus me-2"></i>
                    Ajouter un client
                </button>
            </div>

            <div class="table-container">
                <table class="table custom-table" id="clientsTable">
                    <thead>
                        <tr>
                            <th>Avatar</th>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Email</th>
                            <th>Téléphone</th>
                            <th>Adresse</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="clientsTableBody">
                        <!-- Les données seront chargées via JavaScript -->
                    </tbody>
                </table>
            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <i class="fas fa-user-friends"></i>
                <h4>Aucun client trouvé</h4>
                <p>Commencez par ajouter votre premier client.</p>
            </div>
        </div>
    </div>

    <!-- Modal Ajouter Client -->
    <div class="modal fade" id="addClientModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-user-plus me-2"></i>
                        Ajouter un client
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addClientForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nom *</label>
                                <input type="text" class="form-control" id="nom" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Prénom *</label>
                                <input type="text" class="form-control" id="prenom" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email *</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Téléphone</label>
                                <input type="tel" class="form-control" id="telephone">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label class="form-label">Adresse</label>
                                <input type="text" class="form-control" id="adresse">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Code postal</label>
                                <input type="text" class="form-control" id="codePostal">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ville</label>
                            <input type="text" class="form-control" id="ville">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Salaire (€)</label>
                                <input type="number" class="form-control" id="salaire" step="0.01">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Entreprise</label>
                                <input type="text" class="form-control" id="entreprise">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-primary" onclick="addClient()">
                        <i class="fas fa-save me-2"></i>
                        Enregistrer
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Charger les clients
        async function loadClients() {
            try {
                const response = await fetch('/api/clients');
                const clients = await response.json();
                
                const tbody = document.getElementById('clientsTableBody');
                const emptyState = document.getElementById('emptyState');
                
                if (clients.length === 0) {
                    tbody.innerHTML = '';
                    emptyState.style.display = 'block';
                    return;
                }
                
                emptyState.style.display = 'none';
                tbody.innerHTML = clients.map(client => `
                    <tr>
                        <td>
                            <div class="client-avatar">
                                ${client.nom ? client.nom.charAt(0).toUpperCase() : '?'}${client.prenom ? client.prenom.charAt(0).toUpperCase() : ''}
                            </div>
                        </td>
                        <td>${client.id}</td>
                        <td><strong>${client.nom || '-'}</strong></td>
                        <td>${client.prenom || '-'}</td>
                        <td>${client.email || '-'}</td>
                        <td>${client.telephone || '-'}</td>
                        <td>${client.adresse ? client.adresse + ', ' + (client.codePostal || '') + ' ' + (client.ville || '') : '-'}</td>
                        <td>
                            <button class="action-btn btn-edit" onclick="editClient(${client.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="action-btn btn-delete" onclick="deleteClient(${client.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Erreur lors du chargement des clients:', error);
                document.getElementById('clientsTableBody').innerHTML = '<tr><td colspan="8" class="text-center">Erreur de chargement des données</td></tr>';
            }
        }

        // Ajouter un client
        async function addClient() {
            const form = document.getElementById('addClientForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const client = {
                nom: document.getElementById('nom').value,
                prenom: document.getElementById('prenom').value,
                email: document.getElementById('email').value,
                telephone: document.getElementById('telephone').value,
                adresse: document.getElementById('adresse').value,
                codePostal: document.getElementById('codePostal').value,
                ville: document.getElementById('ville').value,
                salaire: document.getElementById('salaire').value ? parseFloat(document.getElementById('salaire').value) : null,
                entreprise: document.getElementById('entreprise').value
            };

            try {
                const response = await fetch('/api/clients', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(client)
                });

                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('addClientModal')).hide();
                    form.reset();
                    loadClients();
                } else {
                    alert('Erreur lors de l\'ajout du client');
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur lors de l\'ajout du client');
            }
        }

        function editClient(id) {
            // TODO: Implémenter l'édition
            alert('Fonction d\'édition à implémenter');
        }

        function deleteClient(id) {
            if (confirm('Êtes-vous sûr de vouloir supprimer ce client ?')) {
                // TODO: Implémenter la suppression
                alert('Fonction de suppression à implémenter');
            }
        }

        // Charger les données au chargement de la page
        document.addEventListener('DOMContentLoaded', function() {
            loadClients();
        });
    </script>
</body>
</html>
