<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Liste des Paiements</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-container {
            padding: 2rem;
        }
        .page-header {
            background: linear-gradient(45deg, #4a90e2, #7b68ee);
            color: white;
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .data-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .table-container {
            overflow-x: auto;
        }
        .custom-table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .custom-table thead {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }
        .custom-table th {
            border: none;
            padding: 1rem;
            font-weight: 600;
        }
        .custom-table td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .custom-table tbody tr:hover {
            background-color: #f8f9ff;
            transform: scale(1.01);
            transition: all 0.2s ease;
        }
        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-completed {
            background-color: #d4edda;
            color: #155724;
        }
        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }
        .status-failed {
            background-color: #f8d7da;
            color: #721c24;
        }
        .action-btn {
            padding: 0.4rem 0.8rem;
            margin: 0.2rem;
            border-radius: 8px;
            border: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .btn-edit {
            background-color: #4a90e2;
            color: white;
        }
        .btn-delete {
            background-color: #e74c3c;
            color: white;
        }
        .btn-add {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        .back-btn {
            background: linear-gradient(45deg, #6c757d, #5a6268);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.3);
            color: white;
            text-decoration: none;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #6c757d;
        }
        .empty-state i {
            font-size: 4rem;
            color: #dee2e6;
            margin-bottom: 1rem;
        }
        .export-btn {
            background: linear-gradient(45deg, #17a2b8, #138496);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(23, 162, 184, 0.3);
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container main-container">
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h1 class="mb-0">
                        <i class="fas fa-money-bill-wave me-3"></i>
                        Liste des Paiements
                    </h1>
                </div>
                <div class="col-md-6 text-md-end mt-3 mt-md-0">
                    <a href="/" class="back-btn me-2">
                        <i class="fas fa-arrow-left me-2"></i>
                        Retour
                    </a>
                    <a href="/export/csv/payments" class="export-btn">
                        <i class="fas fa-file-csv me-2"></i>
                        Exporter CSV
                    </a>
                </div>
            </div>
        </div>

        <div class="data-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="mb-0">
                    <i class="fas fa-list me-2"></i>
                    Tous les paiements
                </h3>
                <button class="btn-add" data-bs-toggle="modal" data-bs-target="#addPaymentModal">
                    <i class="fas fa-plus me-2"></i>
                    Ajouter un paiement
                </button>
            </div>

            <div class="table-container">
                <table class="table custom-table" id="paymentsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Client</th>
                            <th>Montant</th>
                            <th>Mode</th>
                            <th>Référence</th>
                            <th>Date</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="paymentsTableBody">
                        <!-- Les données seront chargées via JavaScript -->
                    </tbody>
                </table>
            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <i class="fas fa-inbox"></i>
                <h4>Aucun paiement trouvé</h4>
                <p>Commencez par ajouter votre premier paiement.</p>
            </div>
        </div>
    </div>

    <!-- Modal Ajouter Paiement -->
    <div class="modal fade" id="addPaymentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-plus-circle me-2"></i>
                        Ajouter un paiement
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addPaymentForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Client</label>
                                <select class="form-select" id="clientId" required>
                                    <option value="">Sélectionner un client</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Montant (€)</label>
                                <input type="number" class="form-control" id="montant" step="0.01" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Mode de paiement</label>
                                <select class="form-select" id="modePaiement" required>
                                    <option value="">Sélectionner</option>
                                    <option value="CARTE_BANCAIRE">Carte bancaire</option>
                                    <option value="VIREMENT">Virement</option>
                                    <option value="CHEQUE">Chèque</option>
                                    <option value="ESPECES">Espèces</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Statut</label>
                                <select class="form-select" id="statut" required>
                                    <option value="">Sélectionner</option>
                                    <option value="EN_ATTENTE">En attente</option>
                                    <option value="VALIDE">Validé</option>
                                    <option value="ANNULE">Annulé</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Référence transaction</label>
                            <input type="text" class="form-control" id="referenceTransaction">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-primary" onclick="addPayment()">
                        <i class="fas fa-save me-2"></i>
                        Enregistrer
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Charger les paiements
        async function loadPayments() {
            try {
                const response = await fetch('/api/payments');
                const payments = await response.json();
                
                const tbody = document.getElementById('paymentsTableBody');
                const emptyState = document.getElementById('emptyState');
                
                if (payments.length === 0) {
                    tbody.innerHTML = '';
                    emptyState.style.display = 'block';
                    return;
                }
                
                emptyState.style.display = 'none';
                tbody.innerHTML = payments.map(payment => `
                    <tr>
                        <td>${payment.id}</td>
                        <td>${payment.client ? payment.client.nom + ' ' + payment.client.prenom : '-'}</td>
                        <td>${payment.montant ? payment.montant.toFixed(2) + ' €' : '-'}</td>
                        <td>${formatModePaiement(payment.modePaiement)}</td>
                        <td>${payment.referenceTransaction || '-'}</td>
                        <td>${formatDate(payment.datePaiement)}</td>
                        <td><span class="status-badge status-${getStatusClass(payment.statut)}">${payment.statut}</span></td>
                        <td>
                            <button class="action-btn btn-edit" onclick="editPayment(${payment.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="action-btn btn-delete" onclick="deletePayment(${payment.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Erreur lors du chargement des paiements:', error);
                document.getElementById('paymentsTableBody').innerHTML = '<tr><td colspan="8" class="text-center">Erreur de chargement des données</td></tr>';
            }
        }

        // Charger les clients pour le formulaire
        async function loadClients() {
            try {
                const response = await fetch('/api/clients');
                const clients = await response.json();
                const select = document.getElementById('clientId');
                
                select.innerHTML = '<option value="">Sélectionner un client</option>' +
                    clients.map(client => `<option value="${client.id}">${client.nom} ${client.prenom}</option>`).join('');
            } catch (error) {
                console.error('Erreur lors du chargement des clients:', error);
            }
        }

        // Ajouter un paiement
        async function addPayment() {
            const form = document.getElementById('addPaymentForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const payment = {
                clientId: document.getElementById('clientId').value,
                montant: parseFloat(document.getElementById('montant').value),
                modePaiement: document.getElementById('modePaiement').value,
                statut: document.getElementById('statut').value,
                referenceTransaction: document.getElementById('referenceTransaction').value
            };

            try {
                const response = await fetch('/api/payments', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payment)
                });

                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('addPaymentModal')).hide();
                    form.reset();
                    loadPayments();
                } else {
                    alert('Erreur lors de l\'ajout du paiement');
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur lors de l\'ajout du paiement');
            }
        }

        // Fonctions utilitaires
        function formatModePaiement(mode) {
            const modes = {
                'CARTE_BANCAIRE': 'Carte bancaire',
                'VIREMENT': 'Virement',
                'CHEQUE': 'Chèque',
                'ESPECES': 'Espèces'
            };
            return modes[mode] || mode;
        }

        function getStatusClass(statut) {
            const classes = {
                'VALIDE': 'completed',
                'EN_ATTENTE': 'pending',
                'ANNULE': 'failed'
            };
            return classes[statut] || 'pending';
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR') + ' ' + date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        }

        function editPayment(id) {
            // TODO: Implémenter l'édition
            alert('Fonction d\'édition à implémenter');
        }

        function deletePayment(id) {
            if (confirm('Êtes-vous sûr de vouloir supprimer ce paiement ?')) {
                // TODO: Implémenter la suppression
                alert('Fonction de suppression à implémenter');
            }
        }

        // Charger les données au chargement de la page
        document.addEventListener('DOMContentLoaded', function() {
            loadPayments();
            loadClients();
        });
    </script>
</body>
</html>
